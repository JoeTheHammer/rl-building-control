training:
  timesteps: 300000
  report_training: false
  report_denormalized_state: false
  tensorboard_logs: true
hyperparameters:
  n_steps: 2048
  batch_size: 256
  learning_rate: 1.0e-5
  gamma: 0.995
  gae_lambda: 0.95
  ent_coef: 0.0001
  vf_coef: 0.8
  clip_range: 0.25
  target_kl: 0.001
  max_grad_norm: 0.5

environment_wrapper:
  normalize_state: true
  normalize_reward: false
  normalize_action: true
  continuous_action: true
  discrete_action: false
