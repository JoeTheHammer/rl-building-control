building_model: "/home/johannes/workspace/rl-building-control/data/ASHRAE901_HotelSmall_STD2019_Denver.epJSON"
weather_data: "/home/johannes/workspace/rl-building-control/data/USA_IL_Chicago-OHare.Intl.AP.725300_TMY3.epw"

state_space:
  variables:
    air_temp_101:
      type: "Zone Mean Air Temperature"
      zone: "GuestRoom101"
    air_temp_104:
      type: "Zone Mean Air Temperature"
      zone: "GuestRoom104"
    humidity_101:
      type: "Zone Mean Air Humidity Ratio"
      zone: "GuestRoom101"
  meters:
    electricity: "Electricity:Facility"
    gas: "NaturalGas:Facility"
  time_info:
    day_of_month:
      cyclic: true
    month:
      cyclic: true
    day_of_week:
      cyclic: true
    hour:
      cyclic: true

action_space:
  actuators:
    setpoint_temp:
      type: "continuous"
      range: [16.0, 28.0]
      component: "Schedule:Constant"
      control_type: "Schedule Value"
      actuator_key: "PythonControlledSetpoint"
    setpoint_temp_2:
      type: "continuous"
      range: [ 16.0, 28.0 ]
      component: "Schedule:Constant"
      control_type: "Schedule Value"
      actuator_key: "PythonControlledSetpoint_2"

reward_function:
  type: "expression"
  variables: ["air_temp_101", "air_temp_104"]
  expression: >
    - ((air_temp_101 - target_temp)**2 + (air_temp_104 - target_temp)**2)
    - 0.1 * ((setpoint_temp - 23.0)**2 + (setpoint_temp_2 - 23.0)**2)
  params:
    target_temp: 23.0
    sigma: 1.0

normalize_state: true
