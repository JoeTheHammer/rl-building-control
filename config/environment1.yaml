building_model: "/home/johannes/workspace/rl-building-control/data/ASHRAE901_HotelSmall_STD2019_Denver.epJSON"
weather_data: "/home/johannes/workspace/rl-building-control/data/USA_IL_Chicago-OHare.Intl.AP.725300_TMY3.epw"

state_space:
  # Add other possible variables as well (the ones available in info dict, e.g. reward, is_raining, month,
  # setpoint_temp -> which is the last action from the action space)
  variables:
    air_temp_101:
      type: "Zone Mean Air Temperature"
      zone: "GUESTROOM101"
    humidity_101:
      type: "Zone Mean Air Humidity Ratio"
      zone: "GUESTROOM101"
  meters:
    electricity: "Electricity:Facility"
    gas: "NaturalGas:Facility"

action_space:
  actuators:
    setpoint_temp:
      type: "continuous"
      range: [18.0, 28.0]
      component: "Schedule:Constant"
      control_type: "Schedule Value"
      actuator_key: "PythonControlledSetpoint"

reward_function:
  type: "expression"
  variables: ["air_temp_101", "action", "target_temp", "sigma"]
  expression: >
    - abs(air_temp_101 - target_temp) / 10
    - 0.005 * abs(action - target_temp)
  params:
    target_temp: 23.0
    sigma: 2.0
    action: 0.0  # default action fallback if not provided by env


