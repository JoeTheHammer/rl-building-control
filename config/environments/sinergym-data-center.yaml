    Facility_Total_HVAC_Electric_Demand_Rate:
      type: "Facility Total HVAC Electricity Demand Rate"
      zone: "Whole Building"
    Cooling_Setpoint:
      type: "Zone Thermostat Cooling Setpoint Temperature"
      zone: "West Zone"
    Heating_Setpoint:
      type: "Zone Thermostat Heating Setpoint Temperature"
      zone: "West Zone"
    Fanger Model Clothing Value:
      type: "Schedule Value"
      zone: "Clothing Sch"
  time_info:
    day_of_month:
      cyclic: false
    month:
      cyclic: true
    day_of_week:
      cyclic: false
    hour:
      cyclic: false
action_space:
  actuators:
    Cooling Setpoint:
      type: "continuous"
      range: [22.0, 30.0]
      component: "Schedule:Constant"
      control_type: "Schedule Value"
      actuator_key: "Cooling Setpoint RL"
    Heating Setpoint:
      type: "continuous"
      range: [15.0, 22.0]
      component: "Schedule:Constant"
      control_type: "Schedule Value"
      actuator_key: "Heating Setpoint RL"
reward_function:
  type: "expression"
  variables: ["East_Zone_Temperature", "West_Zone_Temperature", "Facility_Total_HVAC_Electric_Demand_Rate"]
  expression: >-
    - energy_weight * lambda_energy * Facility_Total_HVAC_Electric_Demand_Rate - (1
    - energy_weight) * lambda_temperature * (max(0, ((East_Zone_Temperature + West_Zone_Temperature)
    / 2) - comfort_high) + max(0, comfort_low - ((East_Zone_Temperature + West_Zone_Temperature)
    / 2)))
  params:
    energy_weight: 0.5
    lambda_energy: 0.00005
    lambda_temperature: 1.0
    comfort_high: 27.0
    comfort_low: 18.0
episode:
  timesteps_per_hour: 4
  period: [1, 1, 2025, 31, 12, 2025]
