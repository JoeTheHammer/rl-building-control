training:
  timesteps: 1000000
  report_training: true
  report_denormalized_state: false

hyperparameter_tuning:
  enabled: false
  num_trials: 50
  num_episodes: 5

hyperparameters:
  learning_rate: 0.0001
  gamma: 0.99
  buffer_size: 1000000
  tau: 0.005
  batch_size: 256
  policy_delay: 2
  target_policy_noise: 0.2
  target_noise_clip: 0.5
  tensorboard_log: logs/
