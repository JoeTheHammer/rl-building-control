building_model: context/resources/buildings/2ZoneDataCenterHVAC_wEconomizer.epJSON
weather_data: context/resources/weather/USA_NY_New.York-J.F.Kennedy.Intl.AP.744860_TMY3.epw
state_space:
  variables:
    Outdoor Temperature:
      name: Site Outdoor Air Drybulb Temperature
      zone: Environment
    Outdoor Humidity:
      name: Site Outdoor Air Relative Humidity
      zone: Environment
    Wind Speed:
      name: Site Wind Speed
      zone: Environment
    Wind Direction:
      name: Site Wind Direction
      zone: Environment
    Diffuse Solar Radiation:
      name: Site Diffuse Solar Radiation Rate per Area
      zone: Environment
    Direct Solar Radiation:
      name: Site Direct Solar Radiation Rate per Area
      zone: Environment
    East_Zone_Temperature:
      name: Zone Air Temperature
      zone: East Zone
    West_Zone_Temperature:
      name: Zone Air Temperature
      zone: West Zone
    Facility_Total_HVAC_Electric_Demand_Rate:
      name: Facility Total HVAC Electricity Demand Rate
      zone: Whole Building
      exclude_from_state: true
action_space:
  actuators:
    Cooling Setpoint:
      type: continuous
      range:
      - 22.0
      - 30.0
      component: Schedule:Constant
      control_type: Schedule Value
      actuator_key: Cooling Setpoint RL
    Heating Setpoint:
      type: continuous
      range:
      - 15.0
      - 22.0
      component: Schedule:Constant
      control_type: Schedule Value
      actuator_key: Heating Setpoint RL
reward_function:
  type: expression
  variables:
  - East_Zone_Temperature
  - West_Zone_Temperature
  - Facility_Total_HVAC_Electric_Demand_Rate
  expression: "- energy_weight * lambda_energy * Facility_Total_HVAC_Electric_Demand_Rate\
    \ - (1 - energy_weight) * lambda_temperature * (\n    max(0, East_Zone_Temperature\
    \ - comfort_high)\n  + max(0, comfort_low - East_Zone_Temperature)\n  + max(0,\
    \ West_Zone_Temperature - comfort_high)\n  + max(0, comfort_low - West_Zone_Temperature)\n\
    \  )"
  params:
    energy_weight: 0.5
    lambda_energy: 5.0e-05
    lambda_temperature: 1.0
    comfort_high: 27.0
    comfort_low: 18.0
episode:
  timesteps_per_hour: 4
  period:
  - 1
  - 1
  - 2025
  - 31
  - 12
  - 2025
weather_variability:
  Dry Bulb Temperature:
  - 2.0
  - 0.5
  - 24.0
